ai:
  title: "KI & Deep Learning"
  subtitle: "Maschinelles Lernen in der Wissenschaft"
  intro: >
    Von klassischen ML-Methoden bis zu tiefen neuronalen Netzen – ich entwickle
    und implementiere KI-Lösungen für anspruchsvolle wissenschaftliche
    Fragestellungen. Mein Schwerpunkt liegt auf der Anwendung von Deep Learning
    in der Rechnerchemie und der Entwicklung hochperformanter neuronaler
    Netzwerkpotentiale für molekulare Simulationen.
  competencies_title: "Technologien & Methoden"
  projects_title: "Projekte & Anwendungen"

