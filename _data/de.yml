  subtitle: "Leitung komplexer F&E-Projekte"
  intro: >
    Im F&E-Umfeld des DLR leite ich Projekte, die wissenschaftliche Exzellenz
    mit ingenieurmäßiger Umsetzung verbinden. Mein Ansatz kombiniert agile
